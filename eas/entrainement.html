<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Camp - Action</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .action-card { 
            border: 3px solid rgba(212, 175, 55, 0.2); 
            position: relative; 
            overflow: hidden; 
            transform: skewX(-3deg); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9); 
            transition: all 0.4s ease;
        }
        .action-card img { 
            transform: skewX(3deg) scale(1.15); 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: grayscale(80%) contrast(130%); 
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1); 
        }
        .action-card:hover { border-color: #d4af37; z-index: 20; }
        .action-card:hover img { filter: grayscale(0%) contrast(110%); transform: skewX(3deg) scale(1.05); }
        
        .overlay-text {
            background: linear-gradient(to top, rgba(5,5,5,0.9), transparent);
        }
    </style>
</head>
<body class="min-h-screen py-16 px-4 bg-[#030303]">
    <div class="vignette"></div>
    
    <div class="max-w-6xl mx-auto z-10 relative">
        <div class="flex items-end justify-between mb-12">
            <h1 class="text-5xl md:text-7xl font-bold text-white italic uppercase border-l-4 border-[#d4af37] pl-6" style="transform: skewX(-5deg);">
                Training <span class="text-[#d4af37]">Camp</span>
            </h1>
            <p class="text-[#d4af37] tracking-[0.3em] font-bold hidden md:block">WORK ETHIC</p>
        </div>
        
        <!-- Grille de photos de sport (Style Masonry / Asymétrique) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Photo 1 -->
            <div class="action-card tilt-card interactive-el h-[400px]">
                <!-- Remplace le lien par une vraie photo de sport -->
                <img src="3.jpeg" alt="Action 1" class="tilt-content">
                <div class="absolute bottom-0 left-0 w-full p-6 overlay-text tilt-content">
                    <p class="text-white tracking-widest text-sm opacity-70">PHASE 1</p>
                    <p class="text-[#d4af37] font-bold text-3xl italic uppercase">Focus</p>
                </div>
            </div>

            <!-- Photo 2 (Plus grande verticalement) -->
            <div class="action-card tilt-card interactive-el h-[400px] lg:h-[500px] lg:-mt-10">
                <img src="5.jpeg" alt="Action 2" class="tilt-content">
                <div class="absolute bottom-0 left-0 w-full p-6 overlay-text tilt-content">
                    <p class="text-white tracking-widest text-sm opacity-70">PHASE 2</p>
                    <p class="text-[#d4af37] font-bold text-3xl italic uppercase">Détermination</p>
                </div>
            </div>

            <!-- Photo 3 -->
            <div class="action-card tilt-card interactive-el h-[400px]">
                <img src="4.jpeg" alt="Action 3" class="tilt-content">
                <div class="absolute bottom-0 left-0 w-full p-6 overlay-text tilt-content">
                    <p class="text-white tracking-widest text-sm opacity-70">PHASE 3</p>
                    <p class="text-[#d4af37] font-bold text-3xl italic uppercase">Mode Bête</p>
                </div>
            </div>

        </div>

        <button onclick="goToPage('menu.html')" class="mt-16 text-[#d4af37] tracking-widest hover:text-white transition uppercase font-bold flex items-center gap-2 interactive-el">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg> Retour au Dashboard
        </button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
