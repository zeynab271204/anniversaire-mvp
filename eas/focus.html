<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio d'Entraînement</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Design du lecteur audio natif pour coller au thème Noir/Or */
        audio { 
            filter: sepia(20%) hue-rotate(190deg) saturate(70%) grayscale(1) contrast(120%); 
            width: 100%; 
            height: 45px; 
            outline: none; 
            border-radius: 50px;
        }
        /* Personnalisation selon le navigateur */
        audio::-webkit-media-controls-panel { 
            background-color: #0a0a0a; 
        }
        audio::-webkit-media-controls-play-button, 
        audio::-webkit-media-controls-mute-button { 
            background-color: #d4af37; 
            border-radius: 50%; 
        }
        audio::-webkit-media-controls-current-time-display, 
        audio::-webkit-media-controls-time-remaining-display { 
            color: #d4af37; 
            font-family: 'Oswald', sans-serif;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center px-4">
    <div class="vignette"></div>
    
    <div class="w-full max-w-4xl z-10 flex flex-col md:flex-row items-center gap-12 bg-[#111] p-12 border-t-4 border-[#d4af37] shadow-[0_20px_50px_rgba(0,0,0,0.8)]" style="transform: skewX(-3deg);">
        
        <div class="flex items-end justify-center gap-2 h-24 mb-6 md:mb-0" style="transform: skewX(3deg);">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>

        <div class="flex-1 text-center md:text-left" style="transform: skewX(3deg);">
            <p class="text-[#d4af37] tracking-[0.3em] text-sm mb-2 font-bold">TEMPO & CARDIO : 140 BPM</p>
            <h2 class="text-4xl text-white uppercase italic mb-8">Zone de Flow</h2>
            
            <div class="w-full rounded-full border border-[#d4af37]/30 bg-[#0a0a0a] p-2 shadow-[0_0_20px_rgba(212,175,55,0.15)] interactive-el">
                <audio controls class="w-full custom-audio">
                    <source src="musique.mp3" type="audio/mpeg">
                    Ton navigateur ne supporte pas le lecteur audio.
                </audio>
            </div>
            
            <div class="flex items-center justify-center md:justify-start gap-2 mt-4 text-[#a8896c] text-xs tracking-widest uppercase opacity-70">
                <span class="w-2 h-2 rounded-full bg-[#d4af37] animate-pulse"></span>
                Lecture en cours : Rema - MVP Vibe
            </div>
        </div>
    </div>

    <button onclick="goToPage('menu.html')" class="absolute bottom-10 left-10 text-[#d4af37] tracking-widest hover:text-white transition uppercase font-bold flex items-center gap-2 z-10 interactive-el">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg> 
        Retour aux coulisses
    </button>

    <script src="script.js"></script>
</body>
</html>
